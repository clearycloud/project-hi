<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevator ETA</title>

    <link rel="stylesheet" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>
<body>

<div class="building">

    <!-- 엘리베이터 샤프트 -->
    <div class="shaft">

        <div class="floor">9</div>
        <div class="floor">8</div>
        <div class="floor">7</div>
        <div class="floor">6</div>
        <div class="floor">5</div>
        <div class="floor">4</div>
        <div class="floor">3</div>
        <div class="floor">2</div>
        <div class="floor">1</div>

        <div class="elevator-car">
            🛗
        </div>

    </div>

    <!-- 메인 패널 -->
    <div class="control-panel">

        <h1>
            SMART ELEVATOR ETA
        </h1>

        <p>
            실측 데이터를 기반으로 한<br>
            엘리베이터 예상 도착 시스템
        </p>

        <div class="panel">

            <label>현재 엘리베이터 층</label>
            <input type="number" id="currentFloor" placeholder="예: 1">

            <label>정차 예정 층</label>
            <input type="text" id="stops" placeholder="예: 3,5">

            <label>사용자 층</label>
            <input type="number" id="userFloor" placeholder="예: 8">

            <label>문 닫힘 방식</label>

            <select id="doorMode">

                <option value="button">
                    닫힘 버튼 사용
                </option>

                <option value="auto">
                    자동 닫힘
                </option>

            </select>

            <button onclick="calculateETA()">
                ETA 계산
            </button>

        </div>

        <div class="result-box">

            <div id="result">

                ⏱ ETA가 표시됩니다

            </div>

        </div>

    </div>

</div>

<script src="./script.js"></script>

</body>
</html>
