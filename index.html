<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Elevator ETA</title>

    <link rel="stylesheet" href="./style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="background"></div>

<div class="container">

    <div class="header">

        <h1>🚪 Smart Elevator ETA</h1>

        <p>
            실측 데이터를 기반으로 한<br>
            엘리베이터 도착 시간 예측 시스템
        </p>

    </div>

    <div class="card">

        <label>현재 엘리베이터 층</label>
        <input type="number" id="currentFloor" placeholder="예: 1">

        <label>정차 예정 층</label>
        <input type="text" id="stops" placeholder="예: 3,5">

        <label>사용자 층</label>
        <input type="number" id="userFloor" placeholder="예: 8">

        <label>문 닫힘 방식</label>

        <select id="doorMode">
            <option value="button">닫힘 버튼 사용</option>
            <option value="auto">자동 닫힘</option>
        </select>

        <button onclick="calculateETA()">
            예상 시간 계산
        </button>

    </div>

    <div class="result-card">

        <div id="result">
            ⏱ 예상 도착 시간이 표시됩니다
        </div>

    </div>

</div>

<script src="./script.js"></script>

</body>
</html>
